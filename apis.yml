aid: jar-app
name: Jar
description: >-
  Jar is a Bengaluru-based fintech company operating India's first
  micro-savings app, enabling tens of millions of Indians to save in
  24K digital gold from as little as ₹10. The app supports daily,
  weekly, monthly, and instant savings mechanisms, plus a round-up
  feature that automatically invests spare change from everyday
  transactions into 99.5%+ pure digital gold held in insured vaults.
  Founded in 2021 by Nishchay AG (CEO) and Misbah Ashraf (CPO) under
  Changejar Technologies Private Limited, Jar has grown to 50+ million
  registered users across 12,000+ Indian zip codes. The company
  recently vertically integrated its gold operations, moving away
  from a third-party distribution model to purchase, store, and manage
  gold directly. Jar partners with Brink's for global custody, ICICI
  Lombard for insurance, Vistra as independent trustee, and BDO as
  statutory auditor. Adjacent products include Nek, a direct-to-consumer
  gold and silver jewellery brand sold via shopnek.com. Jar reached
  profitability in 2025 after backing from Tiger Global, Arkam Ventures,
  Rainfall Ventures, Yes VC, and others at a $300M+ valuation, and is
  preparing for an IPO. There is no public developer API, SDK, or
  partner integration program — Jar is a B2C consumer mobile app
  distributed exclusively through Apple App Store and Google Play.
